<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Memory Card Game</title>
    

<style>

body{
	text-align: center;
 	display: flex;
    justify-content: center;  /* по горизонталі */
    align-items: center;      /* по вертикалі */
}

#cave{
	display: flex;
	justify-content: center;
	align-items: center;
	position: relative;
	width: 200px;
	height: 420px;
	background-color: lightgrey;
	border: solid 3px black;
}

#lift{
	position: absolute;
	background-color: grey;
	width: 180px;
	height: 80px;
	position: absolut;
	margin: 10px;
	bottom: 0px;
}

.l{
	display: flex;
	justify-content: center;

}

.b{
	width: 80px;
	height: 60px;
} 

</style>

</head>
<body>

<h1 class="l">🛗<b>Ліфт</b></h1>

<div id="cave">

	<div id="lift"><p id="poverh">1</p></div>

</div>

<button class="b" id="b1">Вгору</button>
<button class="b" id="b2">Вниз</button>


<script>
const b1 = document.getElementById("b1");
const b2 = document.getElementById("b2");
const poverh = document.getElementById("poverh")

let audlift = new Audio();
audlift.src="liftik.mp3";

const lift = document.getElementById("lift");

const lNow = 0;

let up = 0;

let pov = 1;

b1.addEventListener("click", function(){
	if (up < 320){
		lift.style.bottom = up + 80 + "px";
		up = up + 80;
		pov = pov + 1;
		poverh.textContent=pov;
		audlift.play();
	};
});

b2.addEventListener("click", function(){
	if (up > 0){
		lift.style.bottom = up - 80 + "px";
		up = up - 80;
		pov = pov - 1;
		poverh.textContent=pov;
		audlift.play();
	};
});



</script>

</body>
</html>
