<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>Memory Card Game</title>
    

<style>

body{
    font-family: "Fredoka one", Arial;
    font-weight: bold;
    text-align: center;
    justify-items: center;
}

#cave{
    display: flex;
    width: 200px;
    height: 400px;
    border: 3px solid black;
    position: relative;
    background-color: lightgrey;
    justify-content: center;
    align-items: center;
}

#lift{
    width: 180px;
    height: 80px;
    position: absolute;
    background-color: gray;
    transition: 0.5s ease;
    transition: 0.7s ease;
    bottom: 0px;
}

.l{
	display: flex;
	justify-content: center;

}

.b{
	width: 80px;
	height: 60px;
	margin-top: 10px;
} 

</style>

</head>
<body>

<h1 class="l">🛗<b>Ліфт</b></h1>

<div id="cave">

	<div id="lift"><p id="poverh">1</p></div>

</div>

<button class="b" id="b1">1</button>
<button class="b" id="b2">2</button>
<button class="b" id="b3">3</button>
<button class="b" id="b4">4</button>
<button class="b" id="b5">5</button>



<script>
const b1 = document.getElementById("b1");
const b2 = document.getElementById("b2");
const b3 = document.getElementById("b3");
const b4 = document.getElementById("b4");
const b5 = document.getElementById("b5");
const poverh = document.getElementById("poverh")

let audlift = new Audio();
audlift.src="liftik.mp3";

const lift = document.getElementById("lift");

const lNow = 0;

let up = 0;

let pov = 1;

b1.addEventListener("click", function(){
	lift.style.bottom = 0 + "px";
	poverh.textContent=1;
	audlift.play();

});

b2.addEventListener("click", function(){
	lift.style.bottom = 80 + "px";
	poverh.textContent=2;
	audlift.play();
});

b3.addEventListener("click", function(){
	lift.style.bottom = 160 + "px";
	poverh.textContent=3;
	audlift.play();
});

b4.addEventListener("click", function(){
	lift.style.bottom = 240 + "px";
	poverh.textContent=4;
	audlift.play();
});

b5.addEventListener("click", function(){
	lift.style.bottom = 320 + "px";
	poverh.textContent=5;
	audlift.play();
});



</script>

</body>
</html>
